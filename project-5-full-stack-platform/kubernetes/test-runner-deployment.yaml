apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-runner
  namespace: automation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-runner
  template:
    metadata:
      labels:
        app: test-runner
    spec:
      containers:
      - name: playwright
        image: automation-test-suite:latest
        env:
        - name: CI
          value: "true"
        resources:
          limits:
            cpu: "1"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
